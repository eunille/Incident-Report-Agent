services:
  - type: web
    name: incident-report-writer
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false        # Set this in Render dashboard — Environment > Secret Files
      - key: GEMINI_API_KEY
        sync: false        # Optional fallback key — set in Render dashboard
    healthCheckPath: /
